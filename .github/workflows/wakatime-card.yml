name: Update WakaTime Card

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Wakatime card
        uses: Pranesh-2005/github-readme-stats-fast-action@v1.2
        with:
          card: wakatime
          options: username=Baishant01&theme=radical
          path: profile/wakatime.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit card
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/wakatime.svg
          git commit -m "Update WakaTime card" || echo "No changes to commit"
          git push origin HEAD